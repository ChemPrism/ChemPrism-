<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to ChemPrism</title>
  <style>
    /* Reset & Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      /* Darker background to make neon pop */
      background-color: #04060a; 
      color: #ffffff;
    }

    /* Background Canvas */
    #chem-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Centered Container */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Glassmorphism Card */
    .card {
      background: rgba(10, 15, 28, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      /* Brightened border for neon effect */
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      /* intensified neon box shadow */
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7),
                  0 0 20px rgba(0, 242, 254, 0.2),
                  0 0 40px rgba(0, 242, 254, 0.1);
      animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Neon Erlenmeyer Icon Container */
    .chem-icon-container {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* SVG Styling for Neon Flask */
    .neon-flask {
      width: 100%;
      height: 100%;
      /* Applies a strong neon drop-shadow to the SVG paths */
      filter: drop-shadow(0 0 2px #fff) 
              drop-shadow(0 0 8px #0ff) 
              drop-shadow(0 0 15px #0ff);
    }

    .flask-structure {
      fill: none;
      stroke: #fff; /* White core for neon */
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .flask-liquid {
      fill: #0ff; /* Neon cyan liquid */
      opacity: 0.8;
    }

    /* Typography */
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 12px;
      line-height: 1.3;
      /* Subtle text glow */
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    p {
      font-size: 1.1rem;
      color: #cbd5e1;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    p strong {
      color: #00ffff; /* Brighter neon cyan */
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
    }

    /* Brighter Redirect Button */
    .btn-redirect {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 28px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #000; /* High contrast text */
      /* Saturated gradient */
      background: linear-gradient(135deg, #00ffff 0%, #a855f7 100%);
      border: none;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      /* Intense button shadow */
      box-shadow: 0 4px 20px rgba(0, 255, 255, 0.5),
                  0 0 15px rgba(168, 85, 247, 0.4);
    }

    .btn-redirect:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(0, 255, 255, 0.7),
                  0 0 25px rgba(168, 85, 247, 0.6);
      background: linear-gradient(135deg, #ccffff 0%, #c084fc 100%);
    }

    .btn-redirect:active {
      transform: translateY(-1px);
    }

    .btn-redirect span {
      transition: transform 0.2s ease;
      font-size: 1.2rem;
    }

    .btn-redirect:hover span {
      transform: translateX(5px);
    }

    /* Entry Animation */
    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>

  <!-- Animated Chemistry Background -->
  <canvas id="chem-canvas"></canvas>

  <!-- Center Card Content -->
  <div class="container">
    <div class="card">
      
      <!-- Custom Neon Erlenmeyer Flask SVG -->
      <div class="chem-icon-container">
        <svg class="neon-flask" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <!-- Flask Liquid -->
          <path class="flask-liquid" d="M32 44c-4.4 0-8 3.6-8 8H40c0-4.4-3.6-8-8-8Z">
            <animate attributeName="d" dur="3s" repeatCount="indefinite"
              values="M32 44c-4.4 0-8 3.6-8 8H40c0-4.4-3.6-8-8-8Z;
                      M32 43c-5 0-9 4-9 9H41c0-5-4-9-9-9Z;
                      M32 44c-4.4 0-8 3.6-8 8H40c0-4.4-3.6-8-8-8Z" />
          </path>
          <!-- Flask Glass Structure -->
          <path class="flask-structure" d="M44 52 L36 12 H28 L20 52 Z M26 12 H38 M22 42 H42" />
        </svg>
      </div>

      <h1>Welcome to ChemPrism</h1>
      <p>Please visit <strong>ChemPrism.com</strong></p>
      
      <a href="https://chemprism.com" class="btn-redirect">
        Visit ChemPrism.com <span>&rarr;</span>
      </a>
    </div>
  </div>

  <!-- Intesified Molecular Simulation Script -->
  <script>
    const canvas = document.getElementById('chem-canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Saturated Neon colors for background
    const neonColors = [
      '#00ffff', // Cyan
      '#a855f7', // Purple
      '#22c55e'  // Green
    ];

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 1.0; // Slightly faster
        this.vy = (Math.random() - 0.5) * 1.0;
        this.radius = Math.random() * 3 + 2;
        // Higher base alpha for more visibility
        this.alpha = Math.random() * 0.6 + 0.4; 
        // Assign a random neon color
        this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        
        // Add subtle glow to individual particles
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        
        // Convert hex to RGBA for alpha channel
        const r = parseInt(this.color.slice(1, 3), 16);
        const g = parseInt(this.color.slice(3, 5), 16);
        const b = parseInt(this.color.slice(5, 7), 16);
        
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.alpha})`;
        ctx.fill();
        
        // Reset shadow for performance
        ctx.shadowBlur = 0;
      }
    }

    // Initialize particles (slightly fewer for performance with shadows)
    const particleCount = Math.min(Math.floor((width * height) / 15000), 60);
    const particles = Array.from({ length: particleCount }, () => new Particle());

    // Connect particles with chemical bonds
    function drawBonds() {
      const maxDistance = 150; // slightly longer connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < maxDistance) {
            // Brighter bonds
            const opacity = (1 - dist / maxDistance) * 0.5; 
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            
            // Use the first particle's color for the bond
            ctx.strokeStyle = `rgba(0, 255, 255, ${opacity})`; // defaulting to cyan for cleaner look
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
        }
      }
    }

    // Animation Loop
    function animate() {
      // Clear with slight trailing effect disabled for sharp neon look
      ctx.clearRect(0, 0, width, height);

      drawBonds();

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
